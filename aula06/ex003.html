<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Título da página</title>
    <style>
        body{
            font:normal 1.3em serif;
        }
    </style>
</head>
<body>
<script>
var nome = window.prompt('seu nome')
var idade = Number.parseInt(window.prompt('sua idade'))
document.writeln(`seu nome é ${nome} e tem ${idade} anos de idade <br>`)
document.writeln(`seu nome em MAIÚSCULO é ${nome.toUpperCase()} <br>`)
document.writeln(`e seu nome em minúsculo é ${nome.toLowerCase()}. <br>`)
document.writeln(`seu nome tem ${nome.length} letras`)
</script>
</body>
</html>
