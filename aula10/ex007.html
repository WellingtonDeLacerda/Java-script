<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Título da página</title>
    <style>
        input{
            width:40px;
        }
        div#res{
            display:inline-block;
            border:1px solid black;
            width:60px;
            text-align:center;
            height:20px;
        }
        #som{
            display:block;
            margin:20px;
            width:60px;
        }
    </style>
</head>
<body>
    <h1>somando valores</h1>
    <input type="number" name="tex1" id="text1"> +
    <input type="number" name="text2" id="text2"> =
    <div id="res">...</div>
    <input id="som" type="button" value="somar" onclick="somar()">
<script>
    function somar(){
    var text1 = window.document.querySelector('input#text1')
    var text2 = window.document.querySelector('input#text2')
    var n1 = Number.parseInt(text1.value)
    var n2 = Number.parseInt(text2.value)
    soma = n1 + n2
    res.innerHTML = soma
}
</script>
</body>
</html>
