<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Título da página</title>
    <style>
        body{
            background-color:black;
            height:97vh;
            position:relative;
            color: white;
        }

            position:absolute;

            left:50%;

</head>
<body>

        <table>
 <input type="number" name="" id="p1">
