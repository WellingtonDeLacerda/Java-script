<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Título da página</title>
    <style>
        body{
            font-family:serif;
        }
    </style>
</head>
<body>
    <h2>preencha o formulário</h2>
    <label for="txt">País:</label>
    <input type="text" id="txt" placeholder="Digite o nome do seu País">
    <input type="button" value="clicar" onclick="clicar()">
    <div id="res">
        
    </div>
    <script>
        function clicar(){
            var text = window.document.querySelector('input#txt')
            var res = window.document.querySelector('div#res')
            var texto = (text.value)
            if(texto == "Brasil"){
                res.innerHTML = `<p>seu país é <strong>${texto}</strong>. você é brasileiro</p>`
            }else{
                res.innerHTML = `<p>seu país é <strong>${texto}</strong>. você é estrangeiro</p>`
            }
        }
    </script>
</body>
</html>
